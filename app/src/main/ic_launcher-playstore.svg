<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#121212"/>

  <!-- All geometry scaled: original 200x200 viewport with r=66.7 wheel centered at 100,100 -->
  <!-- Scale factor: 512/200 * 0.85 (safe zone padding) = 2.176, offset to center at 256,256 -->
  <!-- Simpler: map the 200x200 design to a 430x430 area centered in 512x512 -->
  <!-- scale = 430/200 = 2.15, offset = (512-430)/2 = 41 -->
  <!-- new_x = old_x * 2.15 + 41, new_y = old_y * 2.15 + 41 -->

  <!-- Outer ring: r=66.7 -> 143.4, center = 100*2.15+41 = 256 -->
  <circle cx="256" cy="256" r="143.4" fill="none" stroke="#4A5578" stroke-width="3.6"/>

  <!-- Inner ring: r=51.5 -> 110.7 -->
  <circle cx="256" cy="256" r="110.7" fill="none" stroke="#4A5578" stroke-width="2.1" opacity="0.7"/>

  <!-- 12 radial tick marks (scaled from viewport coords) -->
  <g stroke="#4A5578" stroke-width="2.0" opacity="0.55">
    <!-- 0° -->   <line x1="256" y1="112.6" x2="256" y2="145.3"/>
    <!-- 30° -->  <line x1="327.8" y1="131.7" x2="311.5" y2="160.1"/>
    <!-- 60° -->  <line x1="380.3" y1="184.4" x2="351.9" y2="200.7"/>
    <!-- 90° -->  <line x1="399.4" y1="256" x2="366.7" y2="256"/>
    <!-- 120° --> <line x1="380.3" y1="327.6" x2="351.9" y2="311.3"/>
    <!-- 150° --> <line x1="327.8" y1="380.3" x2="311.5" y2="351.9"/>
    <!-- 180° --> <line x1="256" y1="399.4" x2="256" y2="366.7"/>
    <!-- 210° --> <line x1="184.4" y1="380.3" x2="200.7" y2="351.9"/>
    <!-- 240° --> <line x1="131.7" y1="327.8" x2="160.1" y2="311.5"/>
    <!-- 270° --> <line x1="112.6" y1="256" x2="145.3" y2="256"/>
    <!-- 300° --> <line x1="131.7" y1="184.4" x2="160.1" y2="200.7"/>
    <!-- 330° --> <line x1="184.4" y1="131.7" x2="200.7" y2="160.1"/>
  </g>

  <!-- 12 element dots offset +15° (r=143.4 from center 256,256) -->
  <!-- Fire: #A8656A -->
  <circle cx="293.1" cy="117.5" r="7.5" fill="#A8656A"/>   <!-- Aries 15° -->
  <circle cx="357.4" cy="154.8" r="7.5" fill="#5E8A68"/>   <!-- Taurus 45° -->
  <circle cx="394.7" cy="218.9" r="7.5" fill="#9E8A5C"/>   <!-- Gemini 75° -->
  <circle cx="394.7" cy="293.1" r="7.5" fill="#5880A0"/>   <!-- Cancer 105° -->
  <circle cx="357.4" cy="357.4" r="7.5" fill="#A8656A"/>   <!-- Leo 135° -->
  <circle cx="293.1" cy="394.5" r="7.5" fill="#5E8A68"/>   <!-- Virgo 165° -->
  <circle cx="218.9" cy="394.5" r="7.5" fill="#9E8A5C"/>   <!-- Libra 195° -->
  <circle cx="154.6" cy="357.4" r="7.5" fill="#5880A0"/>   <!-- Scorpio 225° -->
  <circle cx="117.3" cy="293.1" r="7.5" fill="#A8656A"/>   <!-- Sag 255° -->
  <circle cx="117.3" cy="218.9" r="7.5" fill="#5E8A68"/>   <!-- Cap 285° -->
  <circle cx="154.6" cy="154.8" r="7.5" fill="#9E8A5C"/>   <!-- Aqua 315° -->
  <circle cx="218.9" cy="117.5" r="7.5" fill="#5880A0"/>   <!-- Pisces 345° -->

  <!-- Sun glyph: outer circle r=12.1 -> 26.0 -->
  <circle cx="256" cy="256" r="26.0" fill="none" stroke="#FFB300" stroke-width="3.6"/>
  <!-- Sun glyph: inner dot r=2.7 -> 5.8 -->
  <circle cx="256" cy="256" r="5.8" fill="#FFB300"/>
</svg>
